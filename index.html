<div class="calculator-container">
  <div class="header-section">
    <h2>NBA Demand Forecaster</h2>
    <p class="subtitle">Based on the Final Uncapped Regression Model</p>
    <p class="description">This tool predicts total demand magnitude, allowing for results >100% to account for Standing Room Only (SRO) potential.</p>
  </div>
  
  <div class="input-section">
    <div class="input-group">
      <label for="dayOfWeek">📅 Day of the Week</label>
      <select id="dayOfWeek">
        <option value="wednesday">Wednesday (Baseline)</option>
        <option value="monday">Monday</option>
        <option value="tuesday">Tuesday</option>
        <option value="thursday">Thursday</option>
        <option value="friday">Friday</option>
        <option value="saturday">Saturday</option>
        <option value="sunday">Sunday</option>
      </select>
    </div>
    
    <div class="row">
      <div class="input-group half">
        <label for="homeWinPct">🏠 Home Win %</label>
        <input type="number" id="homeWinPct" value="50" min="0" max="100" step="1">
      </div>

      <div class="input-group half">
        <label for="visitorWinPct">✈️ Visitor Win %</label>
        <input type="number" id="visitorWinPct" value="50" min="0" max="100" step="1">
      </div>
    </div>

    <div class="checkbox-wrapper">
      <div class="checkbox-group">
          <input type="checkbox" id="isSuperstar">
          <label for="isSuperstar">⭐ Superstar Visit</label>
      </div>

      <div class="checkbox-group">
          <input type="checkbox" id="isRivalry">
          <label for="isRivalry">🔥 Rivalry Game</label>
      </div>

       <div class="checkbox-group">
          <input type="checkbox" id="isPlayoff">
          <label for="isPlayoff">🏆 Playoff Game</label>
      </div>
    </div>
  </div>
  
  <button id="calculateBtn">Calculate Demand</button>
  
  <div class="result-container">
    <p>Predicted Demand Capacity:</p>
    <h3 id="result">--%</h3>
    <div id="badge" class="badge hidden">HIGH DEMAND</div>
  </div>
</div>
